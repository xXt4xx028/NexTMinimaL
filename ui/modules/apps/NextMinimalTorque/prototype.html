<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NexTMinimaL Torque Pro — Prototype</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #030405;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Consolas', 'Courier New', monospace;
}

/* ─── ROOT PANEL ─── */
.nxt-root {
  width: 280px;
  background: rgba(10, 11, 13, 0.98);
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 4px;
  padding: 9px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.03);
}

/* ─── HEADER ─── */
.nxt-hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.nxt-app-lbl {
  font-size: 7px;
  letter-spacing: 0.35em;
  color: rgba(255,255,255,0.28);
  text-transform: uppercase;
}

.nxt-chip {
  font-size: 6px;
  letter-spacing: 0.18em;
  padding: 2px 6px;
  border: 1px solid;
  border-radius: 2px;
  text-transform: uppercase;
  transition: color 0.3s, border-color 0.3s, background 0.3s;
}
.chip-ok   { color: #3ddc84; border-color: rgba(61,220,132,0.35); background: rgba(61,220,132,0.05); }
.chip-warn { color: #ffaa00; border-color: rgba(255,170,0,0.4);   background: rgba(255,170,0,0.06); }
.chip-crit { color: #ef4444; border-color: rgba(239,68,68,0.4);   background: rgba(239,68,68,0.06); }
.chip-unk  { color: rgba(255,255,255,0.45); border-color: rgba(255,255,255,0.15); background: transparent; }

/* ─── HERO METRICS ROW ─── */
.nxt-metrics {
  display: flex;
  gap: 1px;
  background: rgba(255,255,255,0.05);
  border-top: 1px solid rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}

.nxt-metric {
  flex: 1;
  background: rgba(10,11,13,0.97);
  padding: 7px 8px 6px;
}

.nxt-k {
  font-size: 6px;
  letter-spacing: 0.28em;
  color: rgba(255,255,255,0.28);
  text-transform: uppercase;
  margin-bottom: 3px;
}

.nxt-v {
  font-size: 28px;
  font-weight: 500;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}

.nxt-vu {
  font-size: 8px;
  opacity: 0.35;
  margin-left: 2px;
  font-weight: 400;
  letter-spacing: 0.05em;
}

/* ─── CHART AREA ─── */
.nxt-chart-wrap {
  position: relative;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.04);
  background: rgba(0,0,0,0.25);
}

.nxt-chart-svg {
  width: 100%;
  display: block;
}

/* Legend */
.nxt-legend {
  position: absolute;
  top: 4px;
  right: 4px;
  display: flex;
  gap: 6px;
  align-items: center;
}
.nxt-legend-item {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 5px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.1em;
}
.nxt-legend-line {
  width: 10px;
  height: 1px;
  background: currentColor;
}
.nxt-legend-line.dashed {
  background: none;
  border-top: 1px dashed currentColor;
}

/* ─── FOOTER STATS ─── */
.nxt-footer {
  display: flex;
  gap: 1px;
  background: rgba(255,255,255,0.04);
  border-top: 1px solid rgba(255,255,255,0.04);
  flex-shrink: 0;
}

.nxt-footer > .nxt-fcell {
  flex: 1;
  background: rgba(10,11,13,0.97);
  padding: 5px 6px;
}

.nxt-fcell.right { text-align: right; }

.nxt-peak-v {
  font-size: 12px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin-top: 2px;
}

.nxt-peak-sub {
  font-size: 5.5px;
  color: rgba(255,255,255,0.22);
  margin-top: 2px;
  letter-spacing: 0.05em;
}

.nxt-delta-v {
  font-size: 16px;
  font-weight: 500;
  line-height: 1;
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}

.delta-ok   { color: #3ddc84; }
.delta-warn { color: #ffaa00; }
.delta-crit { color: #ef4444; }
</style>
</head>
<body>

<div class="nxt-root">

  <!-- ─ HEADER ─ -->
  <div class="nxt-hdr">
    <span class="nxt-app-lbl">TORQUE PRO</span>
    <span class="nxt-chip chip-ok" id="stateChip">HEALTHY</span>
  </div>

  <!-- ─ HERO METRICS ─ -->
  <div class="nxt-metrics">
    <div class="nxt-metric">
      <div class="nxt-k">LIVE POWER</div>
      <div class="nxt-v" style="color:#00d4ff" id="hpVal">0<span class="nxt-vu">HP</span></div>
    </div>
    <div class="nxt-metric">
      <div class="nxt-k">TORQUE</div>
      <div class="nxt-v" style="color:#ffaa00" id="tqVal">0<span class="nxt-vu">NM</span></div>
    </div>
  </div>

  <!-- ─ CHART ─ -->
  <div class="nxt-chart-wrap">
    <!-- Legend overlay -->
    <div class="nxt-legend">
      <div class="nxt-legend-item" style="color:rgba(0,212,255,0.4)">
        <div class="nxt-legend-line dashed"></div>
        <span>BASE HP</span>
      </div>
      <div class="nxt-legend-item" style="color:rgba(0,212,255,0.85)">
        <div class="nxt-legend-line"></div>
        <span>HP</span>
      </div>
      <div class="nxt-legend-item" style="color:rgba(255,170,0,0.85)">
        <div class="nxt-legend-line"></div>
        <span>TQ</span>
      </div>
    </div>

    <svg id="chart" class="nxt-chart-svg" viewBox="0 0 262 96" preserveAspectRatio="none">

      <!-- Y-axis labels (left side) -->
      <text x="1" y="7"  font-size="5" fill="rgba(255,255,255,0.2)" font-family="Consolas,monospace" id="yLabelTop">400</text>
      <text x="1" y="40" font-size="5" fill="rgba(255,255,255,0.2)" font-family="Consolas,monospace" id="yLabelMid">200</text>
      <text x="1" y="77" font-size="5" fill="rgba(255,255,255,0.2)" font-family="Consolas,monospace">0</text>

      <!-- HP/TQ axis indicators -->
      <text x="1" y="84" font-size="4.5" fill="rgba(0,212,255,0.45)" font-family="Consolas,monospace">HP</text>
      <text x="10" y="84" font-size="4.5" fill="rgba(255,255,255,0.15)" font-family="Consolas,monospace">/</text>
      <text x="14" y="84" font-size="4.5" fill="rgba(255,170,0,0.45)" font-family="Consolas,monospace">NM</text>

      <!-- Chart area starts at x=22 to leave room for y-labels -->
      <!-- Horizontal grid lines -->
      <line x1="22" y1="6"  x2="262" y2="6"  stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <line x1="22" y1="26" x2="262" y2="26" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <line x1="22" y1="46" x2="262" y2="46" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <line x1="22" y1="66" x2="262" y2="66" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <line x1="22" y1="77" x2="262" y2="77" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

      <!-- Vertical RPM grid lines -->
      <line x1="62"  y1="4" x2="62"  y2="77" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
      <line x1="102" y1="4" x2="102" y2="77" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
      <line x1="142" y1="4" x2="142" y2="77" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
      <line x1="182" y1="4" x2="182" y2="77" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
      <line x1="222" y1="4" x2="222" y2="77" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>

      <!-- X-axis RPM labels -->
      <text x="22"  y="88" font-size="5" fill="rgba(255,255,255,0.2)" font-family="Consolas,monospace">0</text>
      <text x="57"  y="88" font-size="5" fill="rgba(255,255,255,0.2)" font-family="Consolas,monospace">2K</text>
      <text x="97"  y="88" font-size="5" fill="rgba(255,255,255,0.2)" font-family="Consolas,monospace">3K</text>
      <text x="137" y="88" font-size="5" fill="rgba(255,255,255,0.2)" font-family="Consolas,monospace">4K</text>
      <text x="177" y="88" font-size="5" fill="rgba(255,255,255,0.2)" font-family="Consolas,monospace">5K</text>
      <text x="217" y="88" font-size="5" fill="rgba(255,255,255,0.2)" font-family="Consolas,monospace">6K</text>
      <text x="248" y="88" font-size="5" fill="rgba(255,255,255,0.2)" font-family="Consolas,monospace">7K</text>

      <!-- HP baseline curve (dashed, muted cyan) -->
      <polyline id="hpBase" fill="none" stroke="rgba(0,212,255,0.2)" stroke-width="1" stroke-dasharray="3,2.5"/>

      <!-- TQ baseline removed — HP is primary reference; TQ is live-only -->

      <!-- HP live curve (solid cyan) -->
      <polyline id="hpLive" fill="none" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- TQ live curve (solid amber) -->
      <polyline id="tqLive" fill="none" stroke="#ffaa00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- RPM cursor -->
      <line id="cursor" x1="22" y1="4" x2="22" y2="77"
            stroke="rgba(255,255,255,0.32)" stroke-width="0.8" stroke-dasharray="2,2"/>

      <!-- Current operating point dot (HP) -->
      <circle id="hpDot" cx="22" cy="77" r="2" fill="#00d4ff" opacity="0.9"/>

    </svg>
  </div>

  <!-- ─ FOOTER STATS ─ -->
  <div class="nxt-footer">
    <div class="nxt-fcell">
      <div class="nxt-k">PEAK HP</div>
      <div class="nxt-peak-v" style="color:#00d4ff" id="peakHpVal">—</div>
      <div class="nxt-peak-sub" id="peakHpRpm">@ — RPM</div>
    </div>
    <div class="nxt-fcell">
      <div class="nxt-k">PEAK TQ</div>
      <div class="nxt-peak-v" style="color:#ffaa00" id="peakTqVal">—</div>
      <div class="nxt-peak-sub" id="peakTqRpm">@ — RPM</div>
    </div>
    <div class="nxt-fcell right">
      <div class="nxt-k" style="white-space:nowrap">Δ vs BASE</div>
      <div class="nxt-delta-v delta-ok" id="deltaVal">100.0%</div>
    </div>
  </div>

</div>

<script>
// ─── Prototype simulation — mirrors production TorqueCurveChanged data flow ───
// hpCurve[rpm] and tqCurve[rpm] are built as integer-indexed arrays,
// exactly as the event delivers them. buildPathFromArray uses the same
// downsampling logic as the production directive.

var MAX_RPM  = 7000;
var CHART_X0 = 22;
var CHART_W  = 240;
var CHART_Y0 = 4;
var CHART_H  = 73;

// ── Simulate TorqueCurveChanged: build integer-indexed arrays ──
// Represents a typical turbocharged engine (boost adds ~25% over NA peak).
var hpCurve = [];   // HP per integer RPM (0..MAX_RPM)
var tqCurve = [];   // NM per integer RPM

(function buildCurveArrays() {
  for (var rpm = 0; rpm <= MAX_RPM; rpm++) {
    var r    = rpm / MAX_RPM;
    var ramp = Math.min(1, (rpm - 300) / 700);
    // Torque: NA bell peaks ~3200 RPM, turbo plateau extends to ~4800
    var naT  = 360 * Math.exp(-3.2 * Math.pow(r - 0.46, 2));
    var turbo = 80  * Math.max(0, 1 - Math.pow((r - 0.35) / 0.25, 2)); // boost contribution
    tqCurve[rpm] = Math.max(0, (naT + turbo) * ramp);
    hpCurve[rpm] = (tqCurve[rpm] * rpm) / 7127; // already in HP (PS conversion omitted for prototype)
  }
})();

// ── Compute axis ceilings from arrays (same as rebuildAxis in production) ──
var MAX_HP = 0, MAX_TQ = 0;
for (var ri = 0; ri <= MAX_RPM; ri++) {
  if (hpCurve[ri] > MAX_HP) MAX_HP = hpCurve[ri];
  if (tqCurve[ri] > MAX_TQ) MAX_TQ = tqCurve[ri];
}
MAX_HP = Math.ceil(MAX_HP / 50) * 50;
MAX_TQ = Math.ceil(MAX_TQ / 50) * 50;

document.getElementById('yLabelTop').textContent = MAX_HP;
document.getElementById('yLabelMid').textContent = Math.round(MAX_HP / 2);

// ── Same buildPathFromArray as production directive ──
function buildPathFromArray(arr, maxVal, load) {
  var pts  = [];
  var step = Math.max(1, Math.floor(MAX_RPM / 60));
  for (var rpm = 0; rpm <= MAX_RPM; rpm += step) {
    var idx = Math.min(rpm, arr.length - 1);
    var v   = (arr[idx] || 0) * (load !== undefined ? load : 1);
    var x   = CHART_X0 + (rpm / MAX_RPM) * CHART_W;
    var y   = (CHART_Y0 + CHART_H) - (v / maxVal) * CHART_H;
    y = Math.max(CHART_Y0, Math.min(CHART_Y0 + CHART_H, y));
    pts.push(x.toFixed(1) + ',' + y.toFixed(1));
  }
  var lastIdx = arr.length - 1;
  var vLast   = (arr[lastIdx] || 0) * (load !== undefined ? load : 1);
  var yLast   = (CHART_Y0 + CHART_H) - (vLast / maxVal) * CHART_H;
  yLast = Math.max(CHART_Y0, Math.min(CHART_Y0 + CHART_H, yLast));
  pts.push((CHART_X0 + CHART_W).toFixed(1) + ',' + yLast.toFixed(1));
  return pts.join(' ');
}

// Build static HP baseline
document.getElementById('hpBase').setAttribute('points', buildPathFromArray(hpCurve, MAX_HP));

// ── Simulation state ──
var simState = { rpm: 850, load: 0.05, peakHp: 0, peakHpRpm: 0, peakTq: 0, peakTqRpm: 0, t: 0 };

function updateChart() {
  var rpm  = simState.rpm;
  var load = simState.load;

  document.getElementById('hpLive').setAttribute('points', buildPathFromArray(hpCurve, MAX_HP, load));
  document.getElementById('tqLive').setAttribute('points', buildPathFromArray(tqCurve, MAX_TQ, load));

  var cx   = CHART_X0 + (rpm / MAX_RPM) * CHART_W;
  var el   = document.getElementById('cursor');
  el.setAttribute('x1', cx.toFixed(1));
  el.setAttribute('x2', cx.toFixed(1));

  var rpmI = Math.min(Math.round(rpm), hpCurve.length - 1);
  var hpNow = (hpCurve[rpmI] || 0) * load;
  var dotY  = (CHART_Y0 + CHART_H) - (hpNow / MAX_HP) * CHART_H;
  dotY = Math.max(CHART_Y0 + 2, Math.min(CHART_Y0 + CHART_H, dotY));
  var dot = document.getElementById('hpDot');
  dot.setAttribute('cx', cx.toFixed(1));
  dot.setAttribute('cy', dotY.toFixed(1));
}

function updateUI() {
  var rpm  = simState.rpm;
  var load = simState.load;
  var rpmI = Math.min(Math.round(rpm), tqCurve.length - 1);
  var tq   = (tqCurve[rpmI] || 0) * load;
  var hp   = (tq * rpm) / 7127;

  document.getElementById('hpVal').innerHTML = Math.round(hp) + '<span class="nxt-vu">HP</span>';
  document.getElementById('tqVal').innerHTML = Math.round(tq) + '<span class="nxt-vu">NM</span>';

  if (hp > simState.peakHp) {
    simState.peakHp    = hp;
    simState.peakHpRpm = Math.round(rpm);
    document.getElementById('peakHpVal').textContent = Math.round(hp);
    document.getElementById('peakHpRpm').textContent = '@ ' + Math.round(rpm) + ' RPM';
  }
  if (tq > simState.peakTq) {
    simState.peakTq    = tq;
    simState.peakTqRpm = Math.round(rpm);
    document.getElementById('peakTqVal').textContent = Math.round(tq);
    document.getElementById('peakTqRpm').textContent = '@ ' + Math.round(rpm) + ' RPM';
  }

  var baseHp  = hpCurve[rpmI] || 0;
  var delta   = baseHp > 1 ? Math.min(100, (hp / baseHp) * 100) : load * 100;
  var deltaEl = document.getElementById('deltaVal');
  deltaEl.textContent = delta.toFixed(1) + '%';
  if (delta > 20)      { deltaEl.className = 'nxt-delta-v delta-ok';   }
  else if (delta > 10) { deltaEl.className = 'nxt-delta-v delta-warn'; }
  else                 { deltaEl.className = 'nxt-delta-v delta-crit'; }

  var chip = document.getElementById('stateChip');
  if (load < 0.45 && rpm > 1500) { chip.textContent = 'BOOST LTD'; chip.className = 'nxt-chip chip-warn'; }
  else { chip.textContent = 'HEALTHY'; chip.className = 'nxt-chip chip-ok'; }

  updateChart();
}

function tick() {
  simState.t += 0.04;
  var cycle = simState.t % 14;
  if      (cycle < 1.5) { simState.rpm = 850;  simState.load = 0.05; }
  else if (cycle < 6)   { var p = (cycle - 1.5) / 4.5; simState.rpm = 900 + p * (MAX_RPM - 900); simState.load = 0.88 + p * 0.12; }
  else if (cycle < 7.5) { simState.rpm = MAX_RPM - (cycle - 6) * 2500; simState.load = 0.06; }
  else if (cycle < 11)  { var p2 = (cycle - 7.5) / 3.5; simState.rpm = 2000 + p2 * 2200; simState.load = 0.5 + p2 * 0.2; }
  else                  { simState.rpm = Math.max(850, simState.rpm - 80); simState.load = 0.05; }
  simState.rpm  = Math.max(600, Math.min(MAX_RPM, simState.rpm));
  simState.load = Math.max(0,   Math.min(1, simState.load));
  updateUI();
}

updateUI();
window._simInterval = setInterval(tick, 50);
</script>
</body>
</html>
